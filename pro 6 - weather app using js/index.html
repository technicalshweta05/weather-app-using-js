<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg, #1e3a8a, #3b82f6, #06b6d4);
    min-height: 100vh;
    padding: 40px 20px;
    color: #e2e8f0;
}

.container{
    max-width: 600px;
    margin: auto;
}

.header{
    text-align: center;
    margin-bottom: 40px;
}

.header h1{
    font-size: 3rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.2);
}

.header h1 i{
    margin-right: 12px;
    color: #fbbf24;
}

.header p{
    color: #cbd5e1;
    font-size: 1.1rem;
}

form{
    display: flex;
    gap: 12px;
    margin-bottom: 30px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px;
    border-radius: 16px;
    backdrop-filter: blur(10px);
}

.search-wrapper{
    position: relative;
    flex-grow: 1;
}

.search-wrapper i{
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
}

form input{
    width: 100%;
    height: 54px;
    padding: 0 20px 0 50px;
    background: rgba(15,23,42,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    outline: none;
    color: #fff;
    font-size: 1rem;
}

form input::placeholder{
    color: #94a3b8;
}

form button{
    padding: 0 32px;
    background: #fbbf24;
    color: #0f172a;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1rem;
    transition: 0.3s;
}

form button i{
    margin-right: 8px;
}

form button:hover{
    background: #f59e0b;
    transform: translateY(-2px);
}

.mainRes{
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

.mainRes h4{
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #fff;
}

.mainRes h4 mark{
    background: #fbbf24;
    color: #0f172a;
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 1rem;
    margin-left: 12px;
    font-weight: 700;
}

.mainRes h1{
    font-size: 4rem;
    font-weight: 700;
    color: #fff;
    margin: 16px 0;
}

.mainRes h1::after{
    content: "°C";
    font-size: 2rem;
    vertical-align: top;
    margin-left: 4px;
    color: #cbd5e1;
}

.mainRes img{
    width: 100px;
    height: 100px;
    margin: 8px 0;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
}

.mainRes p{
    font-size: 1.3rem;
    color: #cbd5e1;
    text-transform: capitalize;
    margin-top: 8px;
}

.error{
    background: rgba(239,68,68,0.2);
    border: 1px solid rgba(239,68,68,0.4);
    color: #fecaca;
    font-size: 1.1rem;
    padding: 20px;
}

.error i{
    margin-right: 10px;
}


@media only screen and (min-width: 200px) and (max-width: 575px){
    body{
        padding: 20px 12px;
    }
    
    .header{
        margin-bottom: 24px;
    }
    
    .header h1{
        font-size: 2rem;
    }
    
    .header h1 i{
        margin-right: 8px;
    }
    
    .header p{
        font-size: 0.9rem;
    }
    
    form{
        flex-direction: column;
        padding: 12px;
        gap: 10px;
        margin-bottom: 20px;
    }
    
    form input{
        height: 48px;
        font-size: 0.9rem;
        padding: 0 16px 0 45px;
    }
    
    .search-wrapper i{
        left: 16px;
        font-size: 0.9rem;
    }
    
    form button{
        height: 48px;
        padding: 0 20px;
        font-size: 0.9rem;
    }
    
    .mainRes{
        padding: 20px 16px;
        border-radius: 16px;
    }
    
    .mainRes h4{
        font-size: 1.5rem;
    }
    
    .mainRes h4 mark{
        font-size: 0.8rem;
        padding: 3px 8px;
        margin-left: 8px;
    }
    
    .mainRes h1{
        font-size: 3rem;
        margin: 12px 0;
    }
    
    .mainRes h1::after{
        font-size: 1.5rem;
    }
    
    .mainRes img{
        width: 80px;
        height: 80px;
    }
    
    .mainRes p{
        font-size: 1.1rem;
    }
}


@media only screen and (min-width: 576px) and (max-width: 991px){
    body{
        padding: 30px 16px;
    }
    
    .header h1{
        font-size: 2.5rem;
    }
    
    .header p{
        font-size: 1rem;
    }
    
    form{
        padding: 14px;
        gap: 12px;
    }
    
    form input{
        height: 50px;
    }
    
    form button{
        padding: 0 28px;
        height: 50px;
    }
    
    .mainRes{
        padding: 26px;
    }
    
    .mainRes h4{
        font-size: 1.8rem;
    }
    
    .mainRes h1{
        font-size: 3.5rem;
    }
    
    .mainRes img{
        width: 90px;
        height: 90px;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-cloud-sun"></i>Weather App</h1>
            <p>Get real-time weather for any city</p>
        </div>

        <form>
            <div class="search-wrapper">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" placeholder="Enter City Name" name="cityName"/>
            </div>
            <button type="submit"><i class="fa-solid fa-magnifying-glass"></i>Search</button>
        </form>

        <div class="mainRes" id="response">
            <!-- <h4>Pune<mark>IN</mark></h4>
            <h1>35.85</h1>
            <img src="https://openweathermap.org/img/w/03d.png" />
            <p>Scattered clouds</p> -->
        </div>
    </div>

<script>
    let form=document.querySelector("form")
    let response=document.querySelector("#response")
    response.style.display="none";

    form.addEventListener("submit",async (event)=>{
        let cityName=event.target.cityName.value;
        event.preventDefault();

        let fetchData=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=4d8fb5b93d4af21d66a2948710284366&units=metric`)

        let finalRes=await fetchData.json();
        response.style.display="block";
        if(finalRes.cod=="404"|| finalRes.cod=="400"){
           response.innerHTML='<div class="error"><i class="fa-solid fa-circle-exclamation"></i>City Not Found</div>'
        }
        else{
            let {name,sys,weather,main}=finalRes
        
            response.innerHTML=`
            <h4><i class="fa-solid fa-map-pin"></i> ${name}<mark>${sys.country}</mark></h4>
            <h1>${main.temp}</h1>
            <img src="https://openweathermap.org/img/w/${weather[0].icon}.png" />
            <p><i class="fa-solid fa-cloud"></i> ${weather[0].description}</p>
            `
        }
    })
</script>
</body>
</html>
